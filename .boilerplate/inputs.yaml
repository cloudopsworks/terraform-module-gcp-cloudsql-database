# Module configuration

settings:
  # name_prefix: "mydb"              # (Required) Name prefix appended to system_name to form the Cloud SQL instance name.
  # database_version: "POSTGRES_16"  # (Required) Cloud SQL engine version. Examples: POSTGRES_15, POSTGRES_16, MYSQL_8_0, MYSQL_8_4, SQLSERVER_2022_STANDARD, SQLSERVER_2022_ENTERPRISE.
  # tier: "db-custom-2-7680"         # (Required) Machine tier. Examples: db-f1-micro, db-g1-small, db-custom-2-7680, db-custom-4-15360.
  # database_name: ""                # (Optional) Initial database name. Defaults to "postgres", "mysql", or "master" based on engine.
  # master_username: "admin"         # (Optional) Admin username for the instance. Default: "admin".
  # region: ""                       # (Optional) Override the GCP region. Defaults to the provider region.
  # deletion_protection: false       # (Optional) Prevent accidental deletion of the instance. Default: false.
  # availability_type: "ZONAL"       # (Optional) REGIONAL for high availability, ZONAL for single-zone. Default: ZONAL.
  # disk_size: 10                    # (Optional) Initial disk size in GB. Default: 10.
  # disk_autoresize: true            # (Optional) Automatically grow disk when storage threshold is reached. Default: true.
  # disk_autoresize_limit: 0         # (Optional) Maximum disk size in GB for auto-resize. 0 = unlimited. Default: 0.
  # disk_type: "PD_SSD"              # (Optional) Disk type: PD_SSD or PD_HDD. Default: PD_SSD.
  # backup:
  #   enabled: false                 # (Optional) Enable automated backups. Default: false.
  #   start_time: "03:00"            # (Optional) Backup window start time in HH:MM UTC. Default: "03:00".
  #   point_in_time_recovery: false  # (Optional) Enable point-in-time recovery (PostgreSQL only). Default: false.
  #   retained_backups: 7            # (Optional) Number of automated backups to retain. Default: 7.
  #   retention_unit: "COUNT"        # (Optional) Retention unit: COUNT or TIME. Default: COUNT.
  # maintenance:
  #   day: 1                         # (Optional) Maintenance window day of week: 1=Monday, 7=Sunday. Default: 1.
  #   hour: 0                        # (Optional) Maintenance window hour 0-23 UTC. Default: 0.
  #   update_track: "stable"         # (Optional) Update track: canary or stable. Default: stable.
  # database_flags: []               # (Optional) List of database flags as {name, value} objects.
  #   # Example:
  #   # - name: "max_connections"
  #   #   value: "200"
  # insights:
  #   enabled: false                 # (Optional) Enable Query Insights. Default: false.
  #   query_string_length: 1024      # (Optional) Maximum query string length captured. Default: 1024.
  #   record_client_address: false   # (Optional) Record client IP addresses in Query Insights. Default: false.
  # private_ip:
  #   enabled: false                 # (Optional) Assign a private IP via VPC peering instead of a public IP. Default: false.
  #   require_ssl: true              # (Optional) Require SSL/TLS for all connections (ssl_mode=ENCRYPTED_ONLY). Default: true.
  # managed_password: false          # (Optional) Skip random password generation and Secret Manager storage; use Cloud SQL managed password instead. Default: false.
  # password_kms_key_name: ""        # (Optional) GCP KMS key name (full resource name) for CMEK encryption of the Secret Manager secret.
  # hoop:
  #   enabled: false                 # (Optional) Generate Hoop connection output and per-field secrets. Default: false.
  #   agent_id: ""                   # (Required when enabled and community=false) Hoop agent UUID.
  #   community: true                # (Optional) Community mode returns null (GCP SM has no sub-key access). false=enterprise mode creates per-field secrets. Default: true.
  #   import: false                  # (Optional) Mark the Hoop connection as imported (existing). Default: false.
  #   tags: {}                       # (Optional) Tags map attached to the Hoop connection.
  #   access_control: []             # (Optional) List of access control group names for the Hoop connection.

network:
  # network_id: ""                   # (Required when settings.private_ip.enabled=true) VPC network self_link or resource ID.
  # allocated_ip_range: ""           # (Optional) Named allocated IP range for private services connection (VPC peering).
  # authorized_networks: []          # (Optional) List of public IP authorized networks (used when private_ip.enabled=false).
  #   # Example:
  #   # - name: "office"
  #   #   cidr: "203.0.113.0/24"
